name: Daily WeChat Scrape

on:
  schedule:
    - cron: '0 1 * * *'   # UTC 01:00 = 北京时间 09:00
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run（只打印，不写入）"
        required: false
        default: "false"

concurrency:
  group: update-listings
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run WeChat scraper
        id: scraper
        env:
          WEWE_RSS_BASE:  ${{ secrets.WEWE_RSS_BASE }}
          WEWE_RSS_TOKEN: ${{ secrets.WEWE_RSS_TOKEN }}
          DRY_RUN:        ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          cd .github/scripts
          python scrape_wechat.py

      - name: Update README & data/listings.json
        if: steps.scraper.outputs.changed == 'true'
        run: |
          cd .github/scripts
          python update_readme.py

      - name: Commit & push
        if: steps.scraper.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        run: |
          git config --local user.email "bot@campus2027.dev"
          git config --local user.name  "Campus2027 Bot"
          git add .github/scripts/listings.json \
                  .github/scripts/wechat_state.json \
                  README.md \
                  data/listings.json
          git diff-index --quiet HEAD || \
            git commit -m "chore: wechat scrape $(date +'%Y-%m-%d') · 状态已更新"

      - name: Push changes
        if: steps.scraper.outputs.changed == 'true' && github.event.inputs.dry_run != 'true'
        uses: ad-m/github-push-action@v0.8.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
